# EXP001: Feature × Metric Learning (2×3 Factorial)
# Design baseline: research-design-v2.0

experiment_name: "exp001"
seed: 42
data_root: "data/raw/speech_commands_v0.02"

# Feature
feature_type: "log_mel"  # overridden by run_grid.py
n_mels: 40

# Backbone
backbone: "bc_resnet_32"
embedding_dim: 64

# Loss (overridden by run_grid.py)
loss: "prototypical"

# Episode
n_way: 5
n_support: 5
n_query: 5
n_episodes_train: 1000
n_episodes_eval: 600

# Training
epochs: 40
learning_rate: 0.001
weight_decay: 0.00004
optimizer: "adam"
scheduler: "cosine"

# Audio
sample_rate: 16000
n_fft: 512
hop_length: 160
win_length: 400
